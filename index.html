<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Expense Tracker</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#4CAF50;
color:white;
border:none;
}

.item{
display:flex;
justify-content:space-between;
background:#f5f9ff;
padding:8px;
margin-top:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Expense Tracker</h2>

<input id="expenseInput" placeholder="example: auto charge 10">

<button onclick="addExpense()">Add Expense</button>

<button onclick="startVoice()">🎤 Speak Expense</button>

<h3>Expenses</h3>

<div id="expenseList"></div>

<h3>Total</h3>

<div id="total"></div>

</div>

<script>

let expenses=JSON.parse(localStorage.getItem("expenses"))||[];

function addExpense(){

let text=document.getElementById("expenseInput").value.trim();

let parts=text.split(" ");

let amount=parseFloat(parts.pop());

if(isNaN(amount))return;

let item=parts.join(" ");

expenses.push({item,amount});

localStorage.setItem("expenses",JSON.stringify(expenses));

render();

document.getElementById("expenseInput").value="";

}

function render(){

let list="";
let total=0;

expenses.forEach(e=>{

list+=`<div class="item">${e.item}<span>₹${e.amount}</span></div>`;

total+=e.amount;

});

document.getElementById("expenseList").innerHTML=list;
document.getElementById("total").innerHTML="₹ "+total;

}

function startVoice(){

let recognition=new webkitSpeechRecognition();

recognition.onresult=function(event){

let speech=event.results[0][0].transcript;

document.getElementById("expenseInput").value=speech;

addExpense();

};

recognition.start();

}

render();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
